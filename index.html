<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Support</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Manrope', sans-serif; background: #fff; color: #111; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 48px 24px 32px; border-bottom: 1px solid #eee; }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    header p { margin-top: 6px; color: #666; font-size: 0.95rem; }
    main { flex: 1; padding: 48px 24px; max-width: 640px; }
    main h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 20px; }
    .app-list { list-style: none; }
    .app-list li { border: 1px solid #eee; border-radius: 10px; margin-bottom: 12px; }
    .app-list a { display: block; padding: 18px 20px; text-decoration: none; color: #111; font-weight: 600; font-size: 1rem; transition: background 0.15s; border-radius: 10px; }
    .app-list a:hover { background: #f7f7f7; }
    .app-list a span { display: block; font-size: 0.85rem; font-weight: 400; color: #888; margin-top: 3px; }
    footer { padding: 24px; border-top: 1px solid #eee; font-size: 0.8rem; color: #bbb; }
  </style>
</head>
<body>
  <header>
    <h1>App Support</h1>
    <p>Support, privacy, and legal information for our apps.</p>
  </header>
  <main>
    <h2>Apps</h2>
    <ul class="app-list">
      <li>
        <a href="bite-of-balance/">
          Bite of Balance
          <span>Dietician &amp; nutrition tracking app</span>
        </a>
      </li>
    </ul>
  </main>
  <footer>
    &copy; 2026 · <a href="mailto:tolisatolis7@gmail.com" style="color:#bbb;">tolisatolis7@gmail.com</a>
  </footer>
</body>
</html>
